<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Projects – Adriel Hakiem</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      background-color: #ffffff;
      color: #111111;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      min-height: 100vh;
      padding-top: 3.5rem;
      text-align: center;
      text-transform: lowercase;
      letter-spacing: 0.005em;
    }
    .logo {
      max-width: 180px;
      height: auto;
      margin-bottom: 1.25rem;
    }
    nav {
      display: flex;
      gap: 1.25rem;
      margin-bottom: 2rem;
    }
    nav a {
      text-decoration: none;
      color: #111111;
      font-weight: 500;
      transition: opacity 0.2s ease;
    }
    nav a:hover {
      opacity: 0.7;
      text-decoration: none;
    }
    .section-title {
      font-size: 1.25rem;
      font-weight: bold;
      text-decoration: underline;
      margin: 2rem 0 1rem;
    }
    .entry {
      font-size: 1rem;
      margin-bottom: 2rem;
      color: #000080; /* navy */
    }
    .projects-wrap {
      width: 100%;
      max-width: 720px;
      padding: 0 24px;
      display: flex;
      justify-content: center;
    }
    .project-card {
      width: 100%;
      max-width: 620px;
      border: 1px solid #e8e8e8;
      border-radius: 10px;
      padding: 1.25rem;
      text-align: left;
      background: #ffffff;
      color: #111111;
    }
    .project-title {
      display: inline-block;
      font-size: 1.05rem;
      font-weight: 600;
      text-decoration: none;
      color: #111111;
      text-transform: none;
      margin-bottom: 0.55rem;
      line-height: 1.35;
      transition: opacity 0.2s ease;
    }
    .project-title:hover {
      opacity: 0.75;
    }
    .project-desc {
      font-size: 0.96rem;
      color: #333333;
      margin-bottom: 0.85rem;
      text-transform: none;
      line-height: 1.45;
    }
    .project-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      margin-bottom: 0.9rem;
    }
    .project-tag {
      font-size: 0.76rem;
      color: #5e5e5e;
      border: 1px solid #e3e3e3;
      border-radius: 999px;
      padding: 0.18rem 0.5rem;
      text-transform: none;
      letter-spacing: 0.01em;
    }
    .project-impact {
      font-size: 0.9rem;
      color: #000080;
      background: #f7f8ff;
      border-left: 2px solid #000080;
      border-radius: 6px;
      padding: 0.55rem 0.7rem;
      margin-bottom: 1rem;
      text-transform: none;
      line-height: 1.4;
    }
    .project-actions {
      display: flex;
      gap: 0.6rem;
      flex-wrap: wrap;
    }
    .project-btn {
      text-decoration: none;
      border: 1px solid #111111;
      border-radius: 8px;
      padding: 0.42rem 0.72rem;
      font-size: 0.84rem;
      font-weight: 500;
      color: #111111;
      transition: background-color 0.2s ease, color 0.2s ease, opacity 0.2s ease;
    }
    .project-btn:hover {
      background: #111111;
      color: #ffffff;
    }
    .project-btn.secondary {
      border-color: #dadada;
      color: #3b3b3b;
    }
    .project-btn.secondary:hover {
      background: #f7f7f7;
      color: #111111;
    }

    @media (max-width: 768px) {
      body {
        padding-top: 3rem;
      }
      .logo {
        max-width: 138px;
        margin-bottom: 1rem;
      }
      nav {
        gap: 1rem;
        margin-bottom: 1.5rem;
      }
      .section-title {
        font-size: 1.1rem;
        margin: 1.5rem 0 1rem;
      }
      .entry {
        font-size: 0.95rem;
        margin-bottom: 1.5rem;
      }
      .projects-wrap {
        padding: 0 16px;
      }
      .project-card {
        padding: 1rem;
      }
      .project-title {
        font-size: 1rem;
      }
      .project-desc {
        font-size: 0.92rem;
      }
    }
  </style>
</head>
<body>
  <img src="images/logo_transparent-2.png" alt="Adriel Hakiem Logo" class="logo">

  <nav>
    <a href="index.html">about</a>
    <a href="projects.html">projects</a>
  </nav>

  <div class="section-title">builds</div>
  <div class="projects-wrap">
    <p style="font-size: 1.25rem; font-weight: 500; color: #111111;">
      working on it... check my <a href="https://github.com/adrielhakiiem" target="_blank" rel="noopener noreferrer" style="color: #000080; text-decoration: underline;">GitHub</a> for now.
    </p>
  </div>
</body>
</html>
